
sample:
  seed: 10599
  batch_size: 20 # 100
  num_repeats: 200
  save_traj_prob: 0.0

noise:
  name: dock
  num_steps: 100
  prior: from_train
  level:
    name: advance
    min: 0.
    max: 1.
    step2level:
      scale_start: 0.99999
      scale_end: 0.00001
      width: 3

data:
  dataset:
    root: ./data
    assembly_path: test/assemblies/dock_bpep.csv
    dbs:
    - name: bpep
      lmdb_root: bpep/lmdb
      lmdb_path:
        pocmol10: pocmol10.lmdb
        peptide: peptide.lmdb

task:
  name: dock
  db: bpep
  transform:
    name: dock
    settings:
      free: 1
      flexible: 0